<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>관인고등학교 앱</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
    }
    .hidden { display: none; }
    header {
      background: white;
      padding: 15px;
      border-bottom: 1px solid #ddd;
      font-weight: bold;
    }
    .container { padding: 20px; }
    button, select {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }
    .card {
      background: white;
      margin: 15px;
      padding: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<!-- 학교 선택 -->
<div id="selectScreen" class="container">
  <h2>🏫 학교 선택</h2>
  <select id="schoolSelect">
    <option>학교를 선택하세요</option>
    <option>관인고등학교</option>
  </select>
  <br>
  <button onclick="enterApp()">들어가기</button>
</div>

<!-- 메뉴 -->
<div id="menuScreen" class="hidden">
  <header id="schoolName">🏫 학교</header>
  <div class="container">
    <h2>메뉴 선택</h2>
    <button onclick="openPage('timetable')">📅 시간표</button><br>
    <button onclick="openPage('meal')">🍱 급식</button><br>
    <button onclick="goBack()">← 학교 다시 선택</button>
  </div>
</div>

<!-- 시간표 -->
<div id="timetable" class="hidden">
  <header>📅 시간표</header>

  <div class="card">
    <select id="gradeSelect">
      <option value="1">1학년</option>
      <option value="2">2학년</option>
      <option value="3">3학년</option>
    </select>

    <select id="classSelect">
      <option value="1">1반</option>
      <option value="2">2반</option>
    </select>

    <br>
    <button onclick="saveClass()">확인</button>
  </div>

  <div class="card" id="timetableContent"></div>
  <button onclick="goMenu()">← 메뉴로</button>
</div>

<!-- 급식 -->
<div id="meal" class="hidden">
  <header>🍱 급식</header>
  <div class="card" id="mealContent"></div>
  <button onclick="goMenu()">← 메뉴로</button>
</div>

<script>
// ================= 공통 =================
function enterApp() {
  const school = document.getElementById("schoolSelect").value;

  if (school === "학교를 선택하세요") {
    alert("학교를 선택해주세요!");
    return;
  }

  localStorage.setItem("school", school);
  document.getElementById("schoolName").innerText = "🏫 " + school;

  document.getElementById("selectScreen").classList.add("hidden");
  document.getElementById("menuScreen").classList.remove("hidden");
}

function openPage(page) {
  document.getElementById("menuScreen").classList.add("hidden");
  document.getElementById(page).classList.remove("hidden");

  if (page === "meal") loadMeal();
}

function goMenu() {
  document.getElementById("timetable").classList.add("hidden");
  document.getElementById("meal").classList.add("hidden");
  document.getElementById("menuScreen").classList.remove("hidden");
}

function goBack() {
  localStorage.removeItem("school");

  document.getElementById("menuScreen").classList.add("hidden");
  document.getElementById("selectScreen").classList.remove("hidden");
}

// ================= 시간표 =================
function saveClass() {
  const g = document.getElementById("gradeSelect").value;
  const c = document.getElementById("classSelect").value;

  localStorage.setItem("class", g + "-" + c);

  document.getElementById("timetableContent").innerHTML =
    `<h3>${g}-${c} 시간표</h3>`;
}

// ================= 급식 =================
async function loadMeal() {
  const url = "https://meal-server-1.onrender.com/meal";

  let html = "<h3>🍱 오늘 급식</h3>";

  try {
    const res = await fetch(url);
    const data = await res.json();

    const meal = data.mealServiceDietInfo?.[1]?.row?.[0]?.DDISH_NM;

    if (meal) {
      meal.split("<br/>").forEach(food => {
        html += `<p>${food}</p>`;
      });
    } else {
      html += "<p>급식 없음</p>";
    }

  } catch {
    html += "<p>불러오기 실패</p>";
  }

  document.getElementById("mealContent").innerHTML = html;
}

// ================= 자동 로그인 =================
window.onload = () => {
  const saved = localStorage.getItem("school");

  if (saved) {
    document.getElementById("schoolName").innerText = "🏫 " + saved;

    document.getElementById("selectScreen").classList.add("hidden");
    document.getElementById("menuScreen").classList.remove("hidden");
  }
};
</script>

</body>
</html>
